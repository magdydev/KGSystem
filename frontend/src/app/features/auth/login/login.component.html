<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <h1>{{ 'AUTH.LOGIN_TITLE' | translate }}</h1>
      <p class="subtitle">{{ 'AUTH.LOGIN_SUBTITLE' | translate }}</p>
    </div>

    @if (errorMessage(); as msg) {
      <div class="error-message">{{ msg | translate }}</div>
    }

    <form #loginForm="ngForm" (ngSubmit)="login()" class="login-form">
      <div class="form-group">
        <label for="username">{{ 'AUTH.USERNAME' | translate }}</label>
        <input
          id="username"
          name="username"
          type="text"
          [(ngModel)]="username"
          required
          autocomplete="username"
          placeholder="{{ 'AUTH.USERNAME_PLACEHOLDER' | translate }}"
        />
      </div>

      <div class="form-group">
        <label for="password">{{ 'AUTH.PASSWORD' | translate }}</label>
        <input
          id="password"
          name="password"
          type="password"
          [(ngModel)]="password"
          required
          autocomplete="current-password"
          placeholder="{{ 'AUTH.PASSWORD_PLACEHOLDER' | translate }}"
        />
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid">
        {{ 'AUTH.LOGIN_BUTTON' | translate }}
      </button>
    </form>
  </div>
</div>
