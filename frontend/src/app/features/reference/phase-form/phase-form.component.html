<form #phaseForm="ngForm" (ngSubmit)="save()">
  <div style="display:flex;flex-direction:column;gap:1rem">
    <div class="form-row">
      <div class="form-group">
        <label for="code">{{ 'REFERENCE.PHASES.CODE' | translate }}</label>
        <input id="code" name="code" type="text" [(ngModel)]="code" required class="form-control" />
      </div>
      <div class="form-group">
        <label for="sortOrder">{{ 'REFERENCE.PHASES.SORT_ORDER' | translate }}</label>
        <input id="sortOrder" name="sortOrder" type="number" [(ngModel)]="sortOrder" required class="form-control" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="nameAr">{{ 'REFERENCE.PHASES.NAME_AR' | translate }}</label>
        <input id="nameAr" name="nameAr" type="text" [(ngModel)]="nameAr" required class="form-control" />
      </div>
      <div class="form-group">
        <label for="nameEn">{{ 'REFERENCE.PHASES.NAME_EN' | translate }}</label>
        <input id="nameEn" name="nameEn" type="text" [(ngModel)]="nameEn" required class="form-control" />
      </div>
    </div>

    <div class="form-group">
      <label for="descriptionAr">{{ 'REFERENCE.PHASES.DESCRIPTION_AR' | translate }}</label>
      <textarea id="descriptionAr" name="descriptionAr" [(ngModel)]="descriptionAr" class="form-control"></textarea>
    </div>

    <div class="form-group">
      <label for="descriptionEn">{{ 'REFERENCE.PHASES.DESCRIPTION_EN' | translate }}</label>
      <textarea id="descriptionEn" name="descriptionEn" [(ngModel)]="descriptionEn" class="form-control"></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="phaseForm.invalid || saving()">
        {{ (saving() ? 'COMMON.SAVING' : 'REFERENCE.PHASES.SAVE') | translate }}
      </button>
      <button type="button" class="btn btn-secondary" (click)="cancel()">{{ 'REFERENCE.PHASES.CANCEL' | translate }}</button>
    </div>
  </div>
</form>
