services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: kgsystem-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_password123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ./backend
      dockerfile: src/KGSystem.API/Dockerfile
    container_name: kgsystem-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=KGSystemDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;"
      Cors__AllowedOrigins__0: "http://localhost:4200"
    ports:
      - "5100:8080"

volumes:
  sqlserver-data:
